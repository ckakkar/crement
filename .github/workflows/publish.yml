name: Publish to crates.io

# Triggered by pushing a version tag: git tag v0.2.0 && git push --tags
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Gate: full test suite must pass before publishing ─────────────────────
  test:
    name: Test before publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            target
          key: ubuntu-publish-${{ hashFiles('**/Cargo.lock') }}

      - run: cargo test

  # ── Publish ───────────────────────────────────────────────────────────────
  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write   # needed to create a GitHub release
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Verify tag matches Cargo.toml version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v0.2.0
          CRATE_VER="v$(cargo metadata --no-deps --format-version 1 \
            | python3 -c "import sys,json; d=json.load(sys.stdin); \
              print(next(p['version'] for p in d['packages'] if p['name']=='crement'))")"
          echo "Tag: $TAG  |  Cargo.toml: $CRATE_VER"
          if [ "$TAG" != "$CRATE_VER" ]; then
            echo "ERROR: tag $TAG does not match Cargo.toml version $CRATE_VER"
            exit 1
          fi

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # ── GitHub release (changelog excerpt + source archive) ─────────────
      - name: Extract changelog section for this version
        id: changelog
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Pull the section between the version heading and the next heading.
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          # Write to a file to preserve newlines.
          echo "$NOTES" > /tmp/release_notes.md
          cat /tmp/release_notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release_notes.md
          generate_release_notes: false
